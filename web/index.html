<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cc-dj | DJ Controller</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/deck.css">
  <link rel="stylesheet" href="css/mixer.css">
  <link rel="stylesheet" href="css/voice.css">
  <link rel="stylesheet" href="css/actions.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- HEADER -->
  <header id="header">
    <div class="header-left">
      <span class="logo">cc-dj</span>
      <span class="session-clock" id="session-clock">00:00:00</span>
    </div>
    <div class="header-center">
      <span class="software-badge" id="software-badge">REKORDBOX</span>
      <span class="connection-dot" id="connection-dot"></span>
    </div>
    <div class="header-right">
      <div class="energy-meter" id="energy-meter">
        <span class="energy-label">NRG</span>
        <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
        <span class="energy-value" id="energy-value">5</span>
      </div>
      <button class="voice-toggle" id="voice-toggle" title="Toggle voice">
        <svg class="mic-icon" viewBox="0 0 24 24" width="20" height="20">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- MAIN: Deck A / Mixer / Deck B -->
  <main id="main">
    <section class="deck deck-a" id="deck-a" data-deck="0">
      <div class="deck-header">
        <span class="deck-label">DECK A</span>
        <span class="master-badge hidden" id="master-a">M</span>
      </div>
      <div class="track-info" id="track-info-a">
        <div class="track-title" id="track-title-a">-- No Track --</div>
        <div class="track-artist" id="track-artist-a"></div>
      </div>
      <canvas class="waveform" id="waveform-a" width="400" height="80"></canvas>
      <div class="deck-stats">
        <div class="bpm-display" id="bpm-a">
          <span class="bpm-value">0.0</span>
          <span class="bpm-label">BPM</span>
        </div>
        <div class="key-display" id="key-a">--</div>
        <div class="beat-dots" id="beat-dots-a">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
      <div class="time-display">
        <span class="time-elapsed" id="time-elapsed-a">0:00</span>
        <span class="time-separator">/</span>
        <span class="time-remaining" id="time-remaining-a">0:00</span>
      </div>
      <div class="loop-indicator hidden" id="loop-a">4 BEATS</div>
      <div class="transport-buttons">
        <button class="transport-btn btn-cue" data-action="JUMP_CUE_1_A">CUE</button>
        <button class="transport-btn btn-play" data-action="PLAY_A">PLAY</button>
        <button class="transport-btn btn-sync" data-action="SYNC_A">SYNC</button>
        <button class="transport-btn btn-loop" data-action="LOOP_4_A">LOOP</button>
      </div>
    </section>

    <section class="mixer" id="mixer">
      <div class="channel-strip" id="channel-a-strip">
        <span class="strip-label">A</span>
        <div class="eq-column">
          <div class="eq-bar" id="eq-hi-a" title="HI"><div class="eq-fill"></div><div class="eq-center"></div></div>
          <div class="eq-bar" id="eq-mid-a" title="MID"><div class="eq-fill"></div><div class="eq-center"></div></div>
          <div class="eq-bar" id="eq-lo-a" title="LO"><div class="eq-fill"></div><div class="eq-center"></div></div>
        </div>
        <div class="filter-knob" id="filter-a" title="Filter">
          <div class="knob-track"><div class="knob-indicator"></div></div>
        </div>
        <div class="volume-fader" id="volume-a">
          <div class="fader-track"><div class="fader-fill"></div></div>
        </div>
        <button class="cue-btn" id="cue-btn-a">CUE</button>
      </div>

      <div class="crossfader-section">
        <div class="master-volume" id="master-vol">
          <span class="master-label">MST</span>
          <div class="knob-track"><div class="knob-indicator"></div></div>
        </div>
        <div class="crossfader" id="crossfader">
          <div class="cf-track">
            <div class="cf-thumb" id="cf-thumb"></div>
          </div>
          <div class="cf-labels">
            <span>A</span><span>B</span>
          </div>
        </div>
      </div>

      <div class="channel-strip" id="channel-b-strip">
        <span class="strip-label">B</span>
        <div class="eq-column">
          <div class="eq-bar" id="eq-hi-b" title="HI"><div class="eq-fill"></div><div class="eq-center"></div></div>
          <div class="eq-bar" id="eq-mid-b" title="MID"><div class="eq-fill"></div><div class="eq-center"></div></div>
          <div class="eq-bar" id="eq-lo-b" title="LO"><div class="eq-fill"></div><div class="eq-center"></div></div>
        </div>
        <div class="filter-knob" id="filter-b" title="Filter">
          <div class="knob-track"><div class="knob-indicator"></div></div>
        </div>
        <div class="volume-fader" id="volume-b">
          <div class="fader-track"><div class="fader-fill"></div></div>
        </div>
        <button class="cue-btn" id="cue-btn-b">CUE</button>
      </div>
    </section>

    <section class="deck deck-b" id="deck-b" data-deck="1">
      <div class="deck-header">
        <span class="deck-label">DECK B</span>
        <span class="master-badge hidden" id="master-b">M</span>
      </div>
      <div class="track-info" id="track-info-b">
        <div class="track-title" id="track-title-b">-- No Track --</div>
        <div class="track-artist" id="track-artist-b"></div>
      </div>
      <canvas class="waveform" id="waveform-b" width="400" height="80"></canvas>
      <div class="deck-stats">
        <div class="bpm-display" id="bpm-b">
          <span class="bpm-value">0.0</span>
          <span class="bpm-label">BPM</span>
        </div>
        <div class="key-display" id="key-b">--</div>
        <div class="beat-dots" id="beat-dots-b">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
      <div class="time-display">
        <span class="time-elapsed" id="time-elapsed-b">0:00</span>
        <span class="time-separator">/</span>
        <span class="time-remaining" id="time-remaining-b">0:00</span>
      </div>
      <div class="loop-indicator hidden" id="loop-b">4 BEATS</div>
      <div class="transport-buttons">
        <button class="transport-btn btn-cue" data-action="JUMP_CUE_1_B">CUE</button>
        <button class="transport-btn btn-play" data-action="PLAY_B">PLAY</button>
        <button class="transport-btn btn-sync" data-action="SYNC_B">SYNC</button>
        <button class="transport-btn btn-loop" data-action="LOOP_4_B">LOOP</button>
      </div>
    </section>
  </main>

  <!-- FOOTER: Voice Ticker / Action Grid / Tier Bar -->
  <footer id="footer">
    <section class="voice-ticker" id="voice-ticker">
      <div class="ticker-header">
        <span class="ticker-title">VOICE</span>
        <span class="voice-status" id="voice-status">OFF</span>
      </div>
      <div class="ticker-feed" id="ticker-feed"></div>
    </section>

    <section class="action-grid" id="action-grid">
      <div class="tier-tabs" id="tier-tabs">
        <button class="tier-tab active" data-tier="0">Transport</button>
        <button class="tier-tab" data-tier="1">Looping</button>
        <button class="tier-tab" data-tier="2">Cues</button>
        <button class="tier-tab" data-tier="3">FX</button>
        <button class="tier-tab" data-tier="4">Library</button>
        <button class="tier-tab" data-tier="5">Blend</button>
      </div>
      <div class="action-buttons" id="action-buttons"></div>
    </section>

    <section class="tier-bar" id="tier-bar">
      <div class="tier-segment" data-tier="0"><span>T</span></div>
      <div class="tier-segment" data-tier="1"><span>L</span></div>
      <div class="tier-segment" data-tier="2"><span>C</span></div>
      <div class="tier-segment" data-tier="3"><span>F</span></div>
      <div class="tier-segment" data-tier="4"><span>Li</span></div>
      <div class="tier-segment" data-tier="5"><span>B</span></div>
    </section>
  </footer>

  <!-- Settings dialog -->
  <dialog id="settings-dialog">
    <h2>Settings</h2>
    <form method="dialog">
      <fieldset>
        <legend>Software</legend>
        <label><input type="radio" name="software" value="rekordbox" checked> Rekordbox</label>
        <label><input type="radio" name="software" value="serato"> Serato</label>
      </fieldset>
      <fieldset>
        <legend>Safety</legend>
        <label><input type="checkbox" id="lock-playing" checked> Lock playing deck</label>
        <label><input type="checkbox" id="forbid-load" checked> Forbid load on live</label>
      </fieldset>
      <div class="dialog-actions">
        <button type="submit" value="close">Close</button>
      </div>
    </form>
  </dialog>

  <script src="js/canvas.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/deck.js"></script>
  <script src="js/mixer.js"></script>
  <script src="js/voice.js"></script>
  <script src="js/actions.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
